enabled: true

require_approval: true

approval_email: mail@example.com
approval_from: 'My Site <noreply@example.com>'
approval_subject: 'New comment waiting for approval'

quickreply_email: mail@example.com
quickreply_name: Your name
comment_order: desc

lock_timeout: 5
lock_retry_delay: 100000
lock_stale_timeout: 30

enable_on_routes:
  - '/'

disable_on_routes:
  # - /blog/blog-post-to-ignore
  # - /ignore-this-route
  # - /blog/daring-fireball-link

form:
    name: zscomments
    fields:
        - name: name
          id: zscomment-name
          label: ICU.PLUGIN_ZSCOMMENTS.NAME_LABEL
          placeholder: ICU.PLUGIN_ZSCOMMENTS.NAME_PLACEHOLDER
          type: text
          validate:
            required: true

        - name: email
          label: ICU.PLUGIN_ZSCOMMENTS.EMAIL_LABEL
          placeholder: ICU.PLUGIN_ZSCOMMENTS.EMAIL_PLACEHOLDER
          type: email
          validate:
            required: true

        - name: text
          label: ICU.PLUGIN_ZSCOMMENTS.MESSAGE_LABEL
          placeholder: ICU.PLUGIN_ZSCOMMENTS.MESSAGE_PLACEHOLDER
          type: textarea
          validate:
            required: true

        - name: parent_id
          id: zscomment-reply-to
          type: hidden

        - name: date
          type: hidden
          process:
            fillWithCurrentDateTime: true

        - name: title
          type: hidden
          evaluateDefault: grav.page.header.title

        - name: lang
          type: hidden
          evaluateDefault: grav.language.getLanguage

        - name: path
          type: hidden
          evaluateDefault: grav.uri.path

#        - name: g-recaptcha-response
#          label: Captcha
#          type: captcha
#          recaptcha_site_key: e32iojeoi32jeoi32jeoij32oiej32oiej3
#          recaptcha_not_validated: 'Captcha not valid!'
#          validate:
#            required: true
#          process:
#            ignore: true

    buttons:
        - type: submit
          value: ICU.PLUGIN_ZSCOMMENTS.SUBMIT_COMMENT_BUTTON_TEXT

    process:
#        - captcha:
#            recaptcha_secret: ej32oiej23oiej32oijeoi32jeio32je
        - addComment:
        - message: ICU.PLUGIN_ZSCOMMENTS.THANK_YOU_MESSAGE
        - reset: true


